<script>

function agendarGoogle() {

  const titulo = "Lavagem Completa - Lava Car";

  const descricao =
    "Agendamento realizado no Lava Car App.";

  const local = "Lava Car Center";

  /*
    FORMATO:
    AAAAMMDDTHHMMSS
  */

  const dataInicio = "20260520T140000";
  const dataFim = "20260520T150000";

  const url =
    `https://calendar.google.com/calendar/render?action=TEMPLATE` +
    `&text=${encodeURIComponent(titulo)}` +
    `&dates=${dataInicio}/${dataFim}` +
    `&details=${encodeURIComponent(descricao)}` +
    `&location=${encodeURIComponent(local)}`;

  window.open(url, "_blank");
}

</script>
