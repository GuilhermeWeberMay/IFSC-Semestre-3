<!DOCTYPE html>
<html>
<head>
 <meta charset='utf-8'>
 <meta http-equiv='X-UA-Compatible' content='IE=edge'>
 <title>Page Title</title>
<script>
/*
Crie um campo de texto e um botão Adicionar.
Objetivo:
Cada vez que o usuário digitar algo e clicar no botão, o texto deve ser adicionado a uma lista (ul).
Requisitos:
Criar elementos com innerHTML
*/
 function addTexto(){
    const texto = document.getElementById("texto").value;
    const lista = document.getElementById("lista");
    const item = document.createElement("li");
    item.textContent = texto;
    lista.appendChild(item);

 }
</script>

</head>
<body>
 <p> Insira um texto </p>
 <textarea name="texto" id="texto"></textarea><br>
 <input type="button" value="Enviar" onclick="addTexto()">
 <ul id="lista">

 </ul>
</body>
</html>
