<!DOCTYPE html>
<html>
<head>
 <meta charset='utf-8'>
 <meta http-equiv='X-UA-Compatible' content='IE=edge'>
 <title>Page Title</title>
 <meta name='viewport' content='width=device-width, initial-scale=1'>
 <script>
 function somar(){
    const primeiro = document.getElementById("primeiroNumero").value;
    const segundo = document.getElementById("segundoNumero").value;
    const resultado = parseInt(primeiro) + parseInt(segundo);
    document.getElementById("resultado").textContent = "O resultado é: " + resultado;
 }
 </script>

</head>
<body>
 <input type="number" name="" id="primeiroNumero" placeholder="Primeiro número"><br>
 <input type="number" name="" id="segundoNumero" placeholder="Segundo número"><br>
 <input type="button" value="Somar" onclick="somar()">
 <p id="resultado"></p>
</body>
</html>
