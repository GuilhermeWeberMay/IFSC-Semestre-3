<!DOCTYPE html>
<html>
<head>
 <meta charset='utf-8'>
 <meta http-equiv='X-UA-Compatible' content='IE=edge'>
 <title>Exercício de Js </title>
 <meta name='viewport' content='width=device-width, initial-scale=1'>
 <script src='main.js'></script>
 <script>
  function mudarTitulo() {
    const objParag = document.getElementById("parag");
    objParag.innerHTML = "Bem-vindo ao JavaScript!";
  }
 </script>
</head>
<body>
 <h1> Exercícios de JavaScript </h1>

 <p id="parag">Titulo original</p>
 
 <input type="button" value="Clique aqui" onclick="mudarTitulo()">
 
</body>
</html>
