<!DOCTYPE html>
<html>
<head>
 <meta charset='utf-8'>
 <meta http-equiv='X-UA-Compatible' content='IE=edge'>
 <title>Page Title</title>
 <meta name='viewport' content='width=device-width, initial-scale=1'>
 <script>
  function vermelho() {
    document.body.style.backgroundColor = "red";
  }
  function azul() {
    document.body.style.backgroundColor = "blue";
  }
  function verde() {
    document.body.style.backgroundColor = "green";
  }
 </script>
</head>
<body>
 <input type="button" value="Mudar para vermelho" onclick="vermelho()">
 <input type="button" value="Mudar para azul" onclick="azul()">
 <input type="button" value="Mudar para verde" onclick="verde()">
</body>
</html>
