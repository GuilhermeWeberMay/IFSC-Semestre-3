<!DOCTYPE html>
<html lang="pt-BR">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title> Introdução à POO com PHP </title>
 <link rel="stylesheet" href="formata-form.css">
</head>
<body>
 <h1> Atividade de aprendizado em POO com PHP - Atividade 1 </h1>
 
 <form action="atividade1.php" method="post">
  <fieldset>
   <legend> Livraria GWM - Cadastro de livros </legend>

   <label for=""> Título: </label>
   <input type="text" name="titulo" autofocus><br>

   <label for=""> Autor: </label>
   <input type="text" name="autor"><br>

   <label for=""> ISBN: </label>
   <input type="text" name="isbn"><br>

   <label for=""> Preço: </label>
   <input type="number" name="preco" min="0" step="0.01"><br>

   <label for=""> Desconto: </label>
   <input type="number" name="desconto" min="0" max="100" step="0.1">
   <label>%</label><br>

   <button> Enviar formulario </button>

  </fieldset>
 </form>
</body>
</html>
